<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이플 오목 미니게임 UI</title>
  <style>
    :root {
      --win-blue-1: #eef5fb;
      --win-blue-2: #d8e6f1;
      --win-blue-3: #bdd0dd;
      --win-blue-4: #93a8b9;
      --win-blue-5: #496577;
      --line: #c6ced7;
      --line-dark: #8fa4b6;
      --grid-line: #cfd2d5;
      --chat-bg: #262626;
      --blue-btn-top: #53a9e7;
      --blue-btn-mid: #2488d3;
      --blue-btn-bottom: #176ab2;
      --orange-btn-top: #ffb84c;
      --orange-btn-mid: #ff8d1d;
      --orange-btn-bottom: #e26a00;
      --status-bg: #fafafa;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(13, 19, 24, 0.14), rgba(13, 19, 24, 0.14)),
        url("./assets/Map_3F3F.webp") center center / cover no-repeat fixed;
      padding: 16px;
      color: #2d3136;
      font-family: "Gulim", "Dotum", "Tahoma", sans-serif;
      font-size: 9pt;
      line-height: 1.15;
    }

    button,
    input {
      font: inherit;
    }

    .window {
      width: min(100%, 742px);
      background: #cedfeb;
      border: 1px solid #4f6475;
      box-shadow:
        0 0 0 1px #f8fdff,
        0 0 0 2px #9ab0c2,
        0 10px 28px rgba(47, 64, 80, 0.22);
      padding: 2px;
    }

    .window-inner {
      border: 1px solid #d8ebf8;
      background: linear-gradient(180deg, #eef5fa, #dce7f0);
      box-shadow:
        inset 1px 1px 0 #ffffff,
        inset -1px -1px 0 #a7bbcb;
      padding: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 393px 338px;
      gap: 2px;
      align-items: stretch;
    }

    .panel {
      background: transparent;
      border: 0;
      box-shadow: none;
      min-width: 0;
    }

    .board-panel {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 30px;
      gap: 2px;
      padding: 0;
    }

    .board-shell {
      border: 2px solid #6f879b;
      background: #f8fbfd;
      box-shadow: inset 1px 1px 0 #ffffff;
      padding: 3px;
      flex: 1;
    }

    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid #d7dee5;
      background: #ffffff;
      overflow: hidden;
    }

    .board-playfield {
      position: absolute;
      inset: 14px;
      border: 1px solid var(--grid-line);
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: calc(100% / 14) 100%, 100% calc(100% / 14);
      background-position: 0 0, 0 0;
    }

    .stone {
      position: absolute;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      image-rendering: pixelated;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.2));
    }

    .stone .head {
      position: absolute;
      inset: 2px 3px 6px;
      border-radius: 45% 45% 42% 42%;
    }

    .stone .head::before,
    .stone .head::after {
      content: "";
      position: absolute;
    }

    .stone .feet {
      position: absolute;
      bottom: 1px;
      left: 6px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      box-shadow: 8px 0 0 currentColor;
    }

    .stone.pig {
      color: #f8c469;
    }

    .stone.pig .head {
      border: 1px solid #b65179;
      background:
        radial-gradient(circle at 34% 45%, #402331 0 1px, transparent 1.2px),
        radial-gradient(circle at 66% 45%, #402331 0 1px, transparent 1.2px),
        linear-gradient(180deg, #ffbfd1 0, #f798b7 55%, #ec789b 100%);
      box-shadow: inset 1px 1px 0 rgba(255, 240, 245, 0.85);
    }

    .stone.pig .head::before {
      top: -3px;
      left: 1px;
      width: 6px;
      height: 6px;
      border-radius: 2px 3px 0 3px;
      transform: rotate(-38deg);
      background: #f28eaf;
      border: 1px solid #b65179;
      box-shadow: 10px 0 0 #f28eaf, 10px 0 0 1px #b65179;
    }

    .stone.pig .head::after {
      left: 6px;
      bottom: 3px;
      width: 8px;
      height: 6px;
      border-radius: 45%;
      border: 1px solid #c9698d;
      background:
        radial-gradient(circle at 34% 52%, #8c4960 0 1px, transparent 1.2px),
        radial-gradient(circle at 66% 52%, #8c4960 0 1px, transparent 1.2px),
        #f8b0c8;
    }

    .stone.panda {
      color: #98a0a9;
    }

    .stone.panda .head {
      border: 1px solid #4d545d;
      background:
        radial-gradient(circle at 35% 44%, #0d1013 0 1px, transparent 1.2px),
        radial-gradient(circle at 65% 44%, #0d1013 0 1px, transparent 1.2px),
        radial-gradient(circle at 34% 44%, #2e3338 0 3px, transparent 3.2px),
        radial-gradient(circle at 66% 44%, #2e3338 0 3px, transparent 3.2px),
        linear-gradient(180deg, #ffffff 0, #edf1f4 65%, #dce4ea 100%);
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.9);
    }

    .stone.panda .head::before {
      top: -3px;
      left: 1px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2d3136;
      box-shadow: 10px 0 0 #2d3136;
    }

    .stone.panda .head::after {
      left: 7px;
      bottom: 3px;
      width: 6px;
      height: 4px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 40%, #101317 0 1px, transparent 1.2px),
        #ffffff;
    }

    .status-frame {
      min-height: 30px;
      border: 2px solid #6f879b;
      background: #f8fbfd;
      box-shadow: inset 1px 1px 0 #ffffff;
      padding: 1px 7px 0;
    }

    .status-bar {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #3a3d42;
      white-space: nowrap;
    }

    .status-user {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .timer::before {
      content: "";
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid #aa7419;
      background:
        radial-gradient(circle at 30% 30%, #fff7d9 0, #efc25b 48%, #c7881d 100%);
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.55);
    }

    .side-panel {
      display: grid;
      grid-template-rows: 30px 188px 38px 119px 30px;
      gap: 2px;
      padding: 0;
    }

    .logo-box,
    .title-box,
    .upper-frame,
    .start-frame,
    .chat-frame,
    .actions-frame {
      border: 2px solid #6f879b;
      background: #f8fbfd;
      box-shadow: inset 1px 1px 0 #ffffff;
      min-width: 0;
      min-height: 0;
    }

    .header-row {
      display: grid;
      grid-template-columns: 71px 1fr;
      gap: 2px;
      height: 100%;
      margin: 0;
    }

    .logo-box,
    .title-box {
      height: 100%;
    }

    .logo-box {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #485969;
      font-size: 8px;
      font-weight: bold;
      line-height: 1.05;
      letter-spacing: 0.2px;
      background: linear-gradient(180deg, #fafdfd, #dce7ef);
    }

    .title-box {
      display: flex;
      align-items: center;
      padding: 0 8px;
      color: #384651;
      font-size: 9pt;
      letter-spacing: 0;
      background: linear-gradient(180deg, #eef3f8, #d9e3eb);
    }

    .player-area {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 4px;
      min-height: 0;
      height: 100%;
    }

    .upper-frame {
      padding: 2px;
    }

    .host-card,
    .seat-block {
      min-height: 0;
      height: 100%;
    }

    .host-card {
      border: 2px solid #f04444;
      background: #ffffff;
      box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #d3dce5;
    }

    .host-portrait-wrap {
      padding: 4px;
      height: 95px;
      background: linear-gradient(180deg, #c7dced, #b6cfdf);
      border-bottom: 1px solid #cbd8e1;
    }

    .portrait {
      width: 100%;
      height: 100%;
      border: 1px solid #95adbf;
      background: linear-gradient(180deg, #e1ecf4, #c6d5e1);
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.75);
      overflow: hidden;
    }

    .portrait svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .host-meta {
      padding: 3px 4px 4px;
      line-height: 1.15;
    }

    .host-name {
      background: #bccad6;
      color: #4b5d6d;
      text-align: center;
      margin: 0 -1px 3px;
      padding: 2px 0 1px;
      font-size: 13px;
    }

    .score {
      text-align: right;
      margin-bottom: 3px;
      font-size: 12px;
      color: #3b4045;
    }

    .record {
      display: grid;
      grid-template-columns: auto 1fr;
      column-gap: 4px;
      row-gap: 1px;
      align-items: center;
    }

    .record-title {
      align-self: start;
      color: #45494f;
    }

    .record-lines {
      text-align: right;
    }

    .token-sprite {
      width: 20px;
      height: 20px;
      position: relative;
      margin-top: 4px;
    }

    .token-sprite .head {
      position: absolute;
      inset: 2px 2px 5px;
    }

    .token-sprite .feet {
      position: absolute;
      bottom: 0;
      left: 4px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      box-shadow: 7px 0 0 currentColor;
    }

    .token-sprite.pig {
      color: #f0b85f;
    }

    .token-sprite.pig .head {
      border: 1px solid #b65179;
      border-radius: 42% 42% 38% 38%;
      background:
        radial-gradient(circle at 34% 45%, #402331 0 1px, transparent 1.2px),
        radial-gradient(circle at 66% 45%, #402331 0 1px, transparent 1.2px),
        linear-gradient(180deg, #ffbfd1 0, #f798b7 55%, #ec789b 100%);
    }

    .token-sprite.pig .head::before,
    .token-sprite.pig .head::after,
    .token-sprite.panda .head::before,
    .token-sprite.panda .head::after {
      content: "";
      position: absolute;
    }

    .token-sprite.pig .head::before {
      top: -3px;
      left: 1px;
      width: 5px;
      height: 5px;
      border-radius: 2px 3px 0 3px;
      transform: rotate(-35deg);
      background: #f28eaf;
      border: 1px solid #b65179;
      box-shadow: 8px 0 0 #f28eaf, 8px 0 0 1px #b65179;
    }

    .token-sprite.pig .head::after {
      left: 4px;
      bottom: 2px;
      width: 7px;
      height: 5px;
      border-radius: 45%;
      border: 1px solid #c9698d;
      background:
        radial-gradient(circle at 34% 52%, #8c4960 0 1px, transparent 1.1px),
        radial-gradient(circle at 66% 52%, #8c4960 0 1px, transparent 1.1px),
        #f8b0c8;
    }

    .token-sprite.panda {
      color: #96a0aa;
    }

    .token-sprite.panda .head {
      border: 1px solid #4d545d;
      border-radius: 42% 42% 38% 38%;
      background:
        radial-gradient(circle at 35% 44%, #0d1013 0 1px, transparent 1.2px),
        radial-gradient(circle at 65% 44%, #0d1013 0 1px, transparent 1.2px),
        radial-gradient(circle at 34% 44%, #2e3338 0 3px, transparent 3.2px),
        radial-gradient(circle at 66% 44%, #2e3338 0 3px, transparent 3.2px),
        linear-gradient(180deg, #ffffff 0, #edf1f4 65%, #dce4ea 100%);
    }

    .token-sprite.panda .head::before {
      top: -3px;
      left: 1px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2d3136;
      box-shadow: 8px 0 0 #2d3136;
    }

    .token-sprite.panda .head::after {
      left: 5px;
      bottom: 2px;
      width: 6px;
      height: 4px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 40%, #101317 0 1px, transparent 1.1px),
        #ffffff;
    }

    .seat-block {
      border: 1px solid #bccbd7;
      background: #ffffff;
      box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #d2dde6;
      display: grid;
      grid-template-rows: 92px 1fr;
      overflow: hidden;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid #d3dde5;
      background: linear-gradient(180deg, #d2e2ef, #c0d4e4);
    }

    .seat {
      position: relative;
      min-width: 0;
      border-right: 1px solid #d3dde5;
    }

    .seat:last-child {
      border-right: 0;
    }

    .seat.occupied {
      padding: 4px;
    }

    .seat .portrait {
      height: 82px;
    }

    .seat-close {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 10px;
      height: 10px;
      border: 1px solid #737f8a;
      background: linear-gradient(180deg, #edf2f6, #b9c7d2);
      box-shadow: inset 1px 1px 0 #ffffff;
    }

    .seat-close::before,
    .seat-close::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 1px;
      height: 6px;
      background: #4f5860;
      transform: rotate(45deg);
      transform-origin: center;
    }

    .seat-close::after {
      transform: rotate(-45deg);
    }

    .empty-seat::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 11px;
      width: 40px;
      height: 8px;
      border-radius: 50%;
      background: rgba(78, 100, 118, 0.22);
      transform: translateX(-50%);
      filter: blur(0.3px);
    }

    .rival-info {
      padding: 4px 6px 4px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
    }

    .rival-name {
      color: #4b5d6d;
      background: #bccad6;
      margin: -1px -1px 0;
      padding: 2px 6px 1px;
      font-size: 13px;
    }

    .rival-score {
      text-align: center;
      font-size: 12px;
      margin-top: 2px;
    }

    .rival-record {
      display: grid;
      grid-template-columns: auto auto;
      justify-content: start;
      gap: 4px 6px;
      align-items: start;
    }

    .rival-record-lines {
      line-height: 1.1;
    }

    .start-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      height: 100%;
      padding: 0 4px 0 0;
      margin-top: 0;
    }

    .start-frame {
      padding: 0;
    }

    .start-divider {
      width: 1px;
      height: 23px;
      background: #cad5df;
      box-shadow: 1px 0 0 #ffffff;
      margin-right: 2px;
    }

    .start-button {
      width: 100px;
      height: 34px;
      border: 1px solid #8f9ca7;
      background: linear-gradient(180deg, #f7f7f7, #c8d0d8);
      box-shadow:
        inset 1px 1px 0 #ffffff,
        inset -1px -1px 0 #909aa4;
      color: #7c858d;
      font-size: 12pt;
      font-weight: bold;
      letter-spacing: -0.2px;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.85);
      cursor: pointer;
    }

    .chat-wrap {
      margin-top: 0;
    }

    .chat-frame {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 25px;
      gap: 5px;
      padding: 2px;
    }

    .chat-shell {
      border: 1px solid #9eb1c0;
      background: #ffffff;
      box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #d4dce4;
      padding: 1px;
      min-height: 0;
    }

    .chat-box {
      display: grid;
      grid-template-columns: 1fr 14px;
      height: 95px;
      background: var(--chat-bg);
      border: 1px solid #767f88;
    }

    .chat-log {
      padding: 7px 7px 7px 6px;
      color: #f0f0f0;
      overflow: hidden;
      line-height: 1.32;
    }

    .chat-log p {
      margin: 0;
    }

    .chat-scrollbar {
      display: grid;
      grid-template-rows: 12px 1fr 12px;
      background: linear-gradient(180deg, #d8e8f3, #b9cede);
      border-left: 1px solid #96acbe;
    }

    .scroll-arrow,
    .scroll-thumb {
      position: relative;
      border-bottom: 1px solid #8ca4b6;
      box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #8ca4b6;
      background: linear-gradient(180deg, #f6fbfe, #bed3e4);
    }

    .scroll-arrow:last-child {
      border-bottom: 0;
      border-top: 1px solid #8ca4b6;
    }

    .scroll-arrow::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 0;
      transform: translate(-50%, -50%);
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
    }

    .scroll-arrow.up::before {
      border-bottom: 4px solid #256ea2;
    }

    .scroll-arrow.down::before {
      border-top: 4px solid #256ea2;
    }

    .scroll-track {
      position: relative;
      background: linear-gradient(180deg, #e8f1f8, #cadbea);
    }

    .scroll-thumb {
      position: absolute;
      left: 1px;
      right: 1px;
      top: 43px;
      height: 20px;
      border: 1px solid #5c8fb2;
      background: linear-gradient(180deg, #46b0ea, #0d87d6);
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.6);
    }

    .chat-input-row {
      display: grid;
      grid-template-columns: 1fr 18px;
      gap: 3px;
      align-items: end;
      margin-top: 6px;
    }

    .chat-input {
      height: 21px;
      border: 1px solid #7f96aa;
      background: #f9f9fb;
      box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #c5d2dc;
      padding: 0 5px;
      outline: none;
    }

    .send-icon {
      width: 18px;
      height: 21px;
      border: 1px solid #b46924;
      background: linear-gradient(180deg, #ffd98e, #ff9d25);
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.7), inset -1px -1px 0 rgba(143, 79, 7, 0.45);
      position: relative;
    }

    .send-icon::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 8px;
      height: 8px;
      border: 2px solid #fff3d5;
      border-bottom-color: transparent;
      border-right-color: transparent;
      transform: rotate(45deg);
    }

    .actions-frame {
      min-height: 30px;
      padding: 3px 4px 2px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
    }

    .left-actions {
      display: flex;
      gap: 3px;
    }

    .mini-btn {
      min-width: 44px;
      height: 20px;
      padding: 0 7px;
      border: 1px solid #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.6), inset -1px -1px 0 rgba(11, 63, 113, 0.45);
      color: #ffffff;
      text-shadow: 1px 1px 0 rgba(9, 55, 98, 0.6);
      cursor: pointer;
    }

    .mini-btn.exit {
      border-color: #ac5600;
      background: linear-gradient(180deg, var(--orange-btn-top), var(--orange-btn-mid) 68%, var(--orange-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255, 246, 220, 0.7), inset -1px -1px 0 rgba(136, 72, 9, 0.45);
    }

    .mini-btn:active,
    .start-button:active {
      transform: translateY(1px);
    }

    @media (max-width: 780px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .window {
        width: min(100%, 520px);
      }

      .player-area {
        grid-template-columns: 86px 1fr;
      }

      .side-panel {
        grid-template-rows: auto auto auto auto auto;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 8px;
      }

      .window {
        width: 100%;
      }

      .title-box {
        font-size: 10pt;
      }

      .player-area {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-wrap: wrap;
      }

      .left-actions {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <main class="window">
    <div class="window-inner">
      <div class="layout">
        <section class="panel board-panel" aria-label="오목판 영역">
          <div class="board-shell">
            <div class="board">
              <div class="board-playfield" id="boardPlayfield" aria-hidden="true"></div>
            </div>
          </div>
          <div class="status-frame">
            <div class="status-bar">
              <span class="status-user">[ DK로스 ] 님이 하실 차례입니다.</span>
