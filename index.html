<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이플 윷놀이 미니게임</title>
  <style>
    :root {
      --win-blue-1: #eef5fb;
      --win-blue-2: #d8e6f1;
      --win-blue-3: #bdd0dd;
      --win-blue-4: #93a8b9;
      --win-blue-5: #496577;
      --line: #c6ced7;
      --line-dark: #8fa4b6;
      --chat-bg: #262626;
      --blue-btn-top: #53a9e7;
      --blue-btn-mid: #2488d3;
      --blue-btn-bottom: #176ab2;
      --orange-btn-top: #ffb84c;
      --orange-btn-mid: #ff8d1d;
      --orange-btn-bottom: #e26a00;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(13, 19, 24, .14), rgba(13, 19, 24, .14)),
        url("./assets/Map_3F3F.webp") center / cover no-repeat fixed;
      padding: 16px;
      color: #2d3136;
      font-family: "Dotum", "Gulim", "Tahoma", sans-serif;
      font-size: 9pt;
      line-height: 1.15;
    }

    button,
    input {
      font: inherit;
    }

    /* ══════════════ 윈도우 프레임 ══════════════ */

    .window {
      width: min(100%, 738px);
    }

    .window-inner {
      border: 1px solid #d8ebf8;
      background: linear-gradient(180deg, #eef5fa, #dce7f0);
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #a7bbcb;
      padding: 2px;
    }

    /* ══════════════ 로비 ══════════════ */

    .lobby {
      padding: 12px;
    }

    .lobby-title {
      text-align: center;
      font-size: 14pt;
      font-weight: bold;
      color: #384651;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .lobby-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 340px;
      margin: 0 auto;
    }

    .lobby-main {
      flex-direction: row;
      align-items: flex-start;
      max-width: none;
      margin: 0;
      gap: 16px;
    }

    .lobby-left {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lobby-avatar-img {
      display: block;
    }

    .lobby-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 340px;
    }

    .lobby-body input {
      height: 26px;
      border: 1px solid #7f96aa;
      background: #f9f9fb;
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #c5d2dc;
      padding: 0 6px;
      outline: none;
    }

    .lobby-join {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
    }

    .lobby-join input {
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    .lobby-buttons {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .lobby-btn,
    #btn-refresh {
      height: 28px;
      border: 1px solid #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, .6), inset -1px -1px 0 rgba(11, 63, 113, .45);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(9, 55, 98, .6);
      cursor: pointer;
      font-weight: bold;
    }

    #btn-refresh {
      background: linear-gradient(180deg, #f0f0f0, #c8d0d8);
      color: #555;
      border-color: #8f9ca7;
      text-shadow: none;
      font-weight: normal;
    }

    /* 방 목록 */
    #room-list {
      border: 1px solid #9eb1c0;
      background: #fff;
      min-height: 60px;
      max-height: 140px;
      overflow-y: auto;
      padding: 2px;
    }

    .room-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      cursor: pointer;
      border-bottom: 1px solid #e8eef3;
    }

    .room-item:hover {
      background: #eef5fb;
    }

    .room-code-tag {
      font-weight: bold;
      color: #2488d3;
      letter-spacing: 1px;
    }

    .room-empty {
      text-align: center;
      color: #999;
      padding: 16px 0;
      margin: 0;
    }

    /* ══════════════ 게임 레이아웃 ══════════════ */

    .layout {
      display: grid;
      grid-template-columns: 393px 337px;
      gap: 2px;
      align-items: stretch;
    }

    .panel {
      background: transparent;
      border: 0;
      box-shadow: none;
      min-width: 0;
    }

    .board-panel {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 30px;
      gap: 2px;
    }

    .board-shell {
      border: 2px solid #6f879b;
      background: #ffffff;
      box-shadow: inset 1px 1px 0 #fff;
      padding: 3px;
    }

    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: #fff;
      overflow: hidden;
    }

    #canvas {
      display: block;
    }

    /* 오른쪽 액션 버튼 그룹 */
    .right-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .status-frame {
      min-height: 30px;
      border: 2px solid #6f879b;
      background: #ffffff;
      box-shadow: inset 1px 1px 0 #fff;
      padding: 1px 7px 0;
    }

    .status-bar {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #3a3d42;
      white-space: nowrap;
    }

    #room-code-label {
      font-weight: bold;
      color: #2488d3;
      letter-spacing: 1px;
    }

    /* ══════════════ 사이드 패널 ══════════════ */

    .side-panel {
      display: grid;
      grid-template-rows: 38px minmax(0, 1fr) 124px 30px;
      gap: 2px;
    }

    .frame {
      border: 2px solid #6f879b;
      background: #ffffff;
      box-shadow: inset 1px 1px 0 #fff;
      min-width: 0;
      min-height: 0;
    }

    /* 헤더 */
    .header-row {
      position: relative;
      width: 337px;
      height: 38px;
      background: url('/assets/header_bg.png') no-repeat left top;
      background-size: auto;
    }

    .header-title {
      position: absolute;
      left: 103px;
      top: 0;
      bottom: 0;
      right: 0;
      display: flex;
      align-items: center;
      padding: 0 8px;
      color: #000000;
      font-size: 9pt;
      transform: translateY(-1px);
    }

    /* 플레이어 정보 */
    .player-frame {
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }

    .player-cards {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 4px;
      min-height: 0;
      justify-content: center;
    }

    .pcard {
      flex: none;
      width: 77px;
      outline: 2px solid transparent;
      background: #fff;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .pcard-host-icon {
      display: none;
      position: absolute;
      top: 5px;
      right: 5px;
      width: 16px;
      height: 16px;
      z-index: 5;
      pointer-events: none;
    }

    .pcard.is-host .pcard-host-icon {
      display: block;
    }

    .pcard.p0.active-turn { outline-color: #e03030; }
    .pcard.p1.active-turn { outline-color: #28a428; }
    .pcard.p2.active-turn { outline-color: #d4b800; }
    .pcard.p3.active-turn { outline-color: #8844cc; }

    .pcard-avatar-bg {
      width: 77px;
      height: 91px;
      background: url('/assets/Card_avatar_bg.png') no-repeat left top;
      background-size: auto;
      position: relative;
      overflow: hidden;
    }

    .pcard-avatar-img {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }

    .pcard-namebar {
      position: relative;
      width: 77px;
      height: 18px;
      background: url('/assets/Card_name_bg.png') no-repeat left top;
      background-size: auto;
      flex-shrink: 0;
    }

    .pcard-name {
      position: absolute;
      inset: 0;
      text-align: center;
      font-size: 9pt;
      font-weight: normal;
      line-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      padding: 0 2px;
      color: #000000;
    }

    /* 카드 하단 (말 그리드 + 배지) */
    .pcard-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: auto;
      padding: 3px 4px 4px;
    }

    .pcard-piece-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    .piece-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }

    .piece-dot.gone {
      visibility: hidden;
    }

    .piece-dot.movable-dot {
      cursor: pointer;
      outline: 2px dashed #ddaa00;
      outline-offset: 3px;
      background-color: rgba(255, 220, 60, 0.25);
    }

    .piece-dot.movable-dot:hover {
      filter: brightness(1.15);
    }

    .pcard.p0 .piece-dot {
      background: radial-gradient(circle at 35% 35%, #ff9090, #e03030);
      border-color: #a02020;
    }

    .pcard.p1 .piece-dot {
      background: radial-gradient(circle at 35% 35%, #7de07d, #28a428);
      border-color: #1a6b1a;
    }

    .pcard.p2 .piece-dot {
      background: radial-gradient(circle at 35% 35%, #ffe050, #d4b800);
      border-color: #9a8400;
    }

    .pcard.p3 .piece-dot {
      background: radial-gradient(circle at 35% 35%, #cc99ff, #8844cc);
      border-color: #5a2a99;
    }

    /* 보드 위 윷 표시 오버레이 */
    #yut-board-display {
      position: absolute;
      left: 50%;
      top: 71%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    /* 플레이어 카드 하단 액션 버튼 */
    .cards-divider {
      display: block;
      align-self: center;
    }

    .player-action-row {
      display: flex;
      justify-content: flex-start;
      padding: 0 4px 0;
      gap: 6px;
    }

    /* 빈 슬롯 카드 */
    .pcard.empty-slot {
      pointer-events: none;
    }

    /* 준비 배지 */
    .pcard-ready-badge {
      text-align: center;
      font-size: 9pt;
      font-weight: normal;
      color: #28a428;
      min-height: 10px;
    }

    .pcard.is-ready {
    }

/* READY 버튼 활성 상태 */
    #btn-ready.ready-active {
      border-color: #1a7a1a;
      background: linear-gradient(180deg, #5bc05b, #3a9d3a);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0, 80, 0, .6);
    }

    .game-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* 윷 결과 (텍스트 숨김 — 요소는 JS 호환성 유지용) */
    .yut-result {
      display: none;
    }

    .yut-pop {
      animation: yutpop .35s ease-out;
    }

    @keyframes yutpop {
      0% {
        transform: scale(1.8);
        opacity: .5;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* 던진 결과 큐 */
    .throw-queue {
      display: flex;
      gap: 3px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 0;
    }

    .throw-chip {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #8a9aaa;
      border-radius: 3px;
      background: linear-gradient(180deg, #f4f4f4, #d8dce0);
      font-size: 9pt;
      font-weight: bold;
      color: #444;
      animation: yutpop .35s ease-out;
    }

    .game-btn {
      height: 30px;
      min-width: 90px;
      padding: 0 12px;
      border: 1px solid #8f9ca7;
      background: linear-gradient(180deg, #f7f7f7, #c8d0d8);
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #909aa4;
      color: #555;
      font-size: 11pt;
      font-weight: bold;
      cursor: pointer;
    }

    .game-btn.primary {
      border-color: #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, .6), inset -1px -1px 0 rgba(11, 63, 113, .45);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(9, 55, 98, .6);
    }

    .game-btn:active {
      transform: translateY(1px);
    }

    /* 채팅 */
    .chat-frame {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 23px;
      gap: 2px;
      padding: 2px;
      border: none;
      box-shadow: none;
    }

    .chat-shell {
      border: none;
      background: none;
      box-shadow: none;
      padding: 0;
      min-height: 0;
      overflow: hidden;
    }

    .chat-box {
      position: relative;
      height: 100%;
      background: url('/assets/chat_bg.png') center / 100% 100% no-repeat;
      border: none;
      overflow: hidden;
    }

    .chat-log {
      position: absolute;
      inset: 0;
      padding: 6px;
      color: #ffffff;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.35;
      font-size: 9pt;
    }

    .chat-log p {
      margin: 0 0 1px;
    }

    .chat-input-row {
      margin-top: 0;
      display: flex;
      align-items: center;
    }

    .chat-input {
      width: 219px;
      height: 23px;
      border: none;
      background: url('/assets/chat_input_bg.png') no-repeat left center;
      background-size: auto;
      box-shadow: none;
      padding: 0 6px 0 9px;
      outline: none;
      color: #ffffff;
      flex-shrink: 0;
    }

    /* 하단 버튼 */
    .actions-frame {
      min-height: 30px;
      padding: 3px 4px 2px;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .left-actions {
      display: flex;
      gap: 3px;
    }

    .mini-btn {
      min-width: 44px;
      height: 20px;
      padding: 0 7px;
      border: 1px solid #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, .6), inset -1px -1px 0 rgba(11, 63, 113, .45);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(9, 55, 98, .6);
      cursor: pointer;
    }

    .mini-btn.exit {
      border-color: #ac5600;
      background: linear-gradient(180deg, var(--orange-btn-top), var(--orange-btn-mid) 68%, var(--orange-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255, 246, 220, .7), inset -1px -1px 0 rgba(136, 72, 9, .45);
    }

    .mini-btn:active,
    .game-btn:active {
      transform: translateY(1px);
    }

    /* ══════════════ 타이머 ══════════════ */

    .timer-wrap {
      height: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 2px;
    }

    .timer-track {
      flex: 1;
      height: 8px;
      background: #dce4ec;
      border: 1px solid #a0b0be;
      border-radius: 2px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(180deg, #5bc05b, #3a9d3a);
      transition: width .25s linear;
      border-radius: 1px;
    }

    .timer-fill.urgent {
      background: linear-gradient(180deg, #e85050, #c03030);
    }

    #timer-text {
      min-width: 28px;
      text-align: right;
      font-family: "Dotum","Gulim","Tahoma",sans-serif;
      font-size: 9pt;
      font-weight: bold;
      color: #555;
    }

    #timer-text.urgent {
      color: #d03030;
    }

    /* ══════════════ 윷짝 ══════════════ */

    #yut-sticks {
      display: flex;
      gap: 5px;
      justify-content: center;
      min-height: 20px;
    }

    .stick {
      width: 10px;
      height: 28px;
      border-radius: 3px;
      border: 1px solid #8a7a50;
      animation: stickDrop .3s ease-out both;
    }

    .stick.flat {
      background: linear-gradient(180deg, #f8ecc8, #e4d09a);
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, .6);
    }

    .stick.round {
      background: linear-gradient(180deg, #a07830, #785818);
      box-shadow: inset 1px 1px 0 rgba(180, 150, 100, .4);
    }

    .stick.backdo {
      border-color: #c04040;
      box-shadow: 0 0 4px rgba(200, 60, 60, .5);
    }

    @keyframes stickDrop {
      0% {
        transform: translateY(-12px) rotate(8deg);
        opacity: 0;
      }

      100% {
        transform: translateY(0) rotate(0);
        opacity: 1;
      }
    }

    /* ══════════════ 로비 HUD ══════════════ */

    #lobby-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    #lobby-greeting {
      font-family: "Dotum", "Gulim", "Tahoma", sans-serif;
      font-size: 9pt;
      color: #384651;
    }

    #lobby-elixir {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    #lobby-elixir img {
      height: 16px;
      image-rendering: pixelated;
      vertical-align: middle;
    }

    #lobby-elixir-count {
      font-weight: bold;
      color: #7b2fbe;
      font-size: 9pt;
    }

    /* ══════════════ 턴 표시 ══════════════ */

    .pcard.active-turn {
    }

    /* ══════════════ 반응형 ══════════════ */

    @media (max-width: 780px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .window {
        width: min(100%, 520px);
      }

      .side-panel {
        grid-template-rows: auto auto auto auto auto;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 8px;
      }

      .window {
        width: 100%;
      }

      .player-cards {
        grid-template-columns: 1fr;
      }

      .actions,
      .left-actions {
        flex-wrap: wrap;
      }
    }

    /* ══════════════ 모달 ══════════════ */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-box {
      background: #cedfeb;
      border: 1px solid #4f6475;
      padding: 8px;
      min-width: 280px;
      max-width: 400px;
      font-family: "Dotum", "Gulim", "Tahoma", sans-serif;
      font-size: 9pt;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
    }

    .modal-title {
      font-weight: bold;
      margin-bottom: 6px;
      border-bottom: 1px solid #c6ced7;
      padding-bottom: 4px;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }

    .avatar-item {
      border: 2px solid #c6ced7;
      padding: 2px;
      cursor: pointer;
      text-align: center;
      background: #f0f6fa;
    }

    .avatar-item:hover {
      border-color: #2488d3;
    }

    .avatar-item.owned {
      border-color: #2488d3;
    }

    .avatar-item.equipped {
      border-color: #e04848;
      background: #ffe0e0;
    }

    .avatar-item.locked {
      opacity: .4;
      cursor: default;
    }

    .avatar-item img {
      width: 48px;
      height: 48px;
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
    }

    .shop-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 6px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid #c6ced7;
      background: #f0f6fa;
    }

    .shop-item img {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
    }

    .shop-item-info {
      flex: 1;
    }

    .shop-item-price {
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <!-- ════════ 로그인/회원가입 화면 ════════ -->
  <main id="screen-auth" class="window">
    <div class="window-inner">
      <div class="lobby">

        <!-- 로그인 폼 -->
        <div id="auth-login" class="lobby-body">
          <input id="inp-login-nick" maxlength="12" placeholder="닉네임">
          <input id="inp-login-pw" type="password" placeholder="비밀번호">
          <button id="btn-login" class="lobby-btn" type="button">로그인</button>
          <button id="btn-show-signup" class="lobby-btn" type="button"
            style="background:linear-gradient(180deg,#f0f0f0,#c8d0d8);color:#555;border-color:#8f9ca7;text-shadow:none;">회원가입</button>
          <p id="login-error" style="color:#e04848;text-align:center;min-height:14px;margin:0;"></p>
        </div>

        <!-- 회원가입 폼 -->
        <div id="auth-signup" class="lobby-body" style="display:none">
          <input id="inp-signup-nick" maxlength="12" placeholder="닉네임">
          <input id="inp-signup-pw" type="password" placeholder="비밀번호">
          <input id="inp-signup-pw2" type="password" placeholder="비밀번호 확인">
          <input id="inp-signup-ingame" maxlength="12" placeholder="메랜 닉네임 (본인확인용)">
          <button id="btn-signup" class="lobby-btn" type="button">가입하기</button>
          <button id="btn-show-login" class="lobby-btn" type="button"
            style="background:linear-gradient(180deg,#f0f0f0,#c8d0d8);color:#555;border-color:#8f9ca7;text-shadow:none;">돌아가기</button>
          <p id="signup-error" style="color:#e04848;text-align:center;min-height:14px;margin:0;"></p>
        </div>

      </div>
    </div>
  </main>

  <!-- ════════ 로비 화면 ════════ -->
  <main id="screen-lobby" class="window" style="display:none">
    <div class="window-inner">
      <div class="lobby">
        <div id="lobby-hud">
          <span id="lobby-greeting"><span id="greeting-name"></span>님 안녕하세요~</span>
          <span id="lobby-elixir">
            <img src="/assets/Elixir.png" alt="Elixir">
            <span id="lobby-elixir-count">0</span>
          </span>
        </div>
        <div class="lobby-body lobby-main">
          <div class="lobby-left">
            <img id="lobby-avatar-img" class="lobby-avatar-img" alt="">
            <button id="btn-randomize-avatar" class="lobby-btn" type="button" style="margin-top:6px">아바타 변경</button>
          </div>
          <div class="lobby-right">
            <div class="lobby-buttons">
              <button id="btn-create" class="lobby-btn" type="button">방 만들기</button>
              <div class="lobby-join">
                <input id="inp-code" maxlength="4" placeholder="방 코드">
                <button id="btn-join" class="lobby-btn" type="button">참가</button>
              </div>
              <button id="btn-inventory" class="lobby-btn" type="button">인벤토리</button>
              <button id="btn-shop" class="lobby-btn" type="button">상점</button>
            </div>
            <div id="room-list"></div>
            <button id="btn-refresh" type="button">방 목록 새로고침</button>
            <button id="btn-logout" type="button"
              style="height:22px;padding:0 8px;border:1px solid #ac5600;background:linear-gradient(180deg,#ffb84c,#ff8d1d 68%,#e26a00);color:#fff;text-shadow:1px 1px 0 rgba(136,72,9,.6);cursor:pointer;font-family:'Dotum','Gulim','Tahoma',sans-serif;font-size:9pt;align-self:flex-end;">로그아웃</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 인벤토리 모달 -->
  <div id="modal-inventory" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title">인벤토리</div>
      <div id="inventory-grid" class="avatar-grid"></div>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button id="btn-unequip" class="lobby-btn" type="button" style="flex:1">기본값으로 초기화</button>
        <button id="modal-inventory-close" class="lobby-btn" type="button"
          style="flex:1;background:linear-gradient(180deg,#f0f0f0,#c8d0d8);color:#555;border-color:#8f9ca7;text-shadow:none;">닫기</button>
      </div>
    </div>
  </div>

  <!-- 상점 모달 -->
  <div id="modal-shop" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-title">상점 <span id="shop-elixir-display"></span></div>
      <div id="shop-list" class="shop-list"></div>
      <button id="modal-shop-close" class="lobby-btn" type="button"
        style="width:100%;background:linear-gradient(180deg,#f0f0f0,#c8d0d8);color:#555;border-color:#8f9ca7;text-shadow:none;">닫기</button>
    </div>
  </div>

  <!-- ════════ 게임 화면 ════════ -->
  <main id="screen-game" class="window" style="display:none">
    <div class="window-inner">
      <div class="layout">

        <!-- ── 왼쪽: 윷판 ── -->
        <section class="panel board-panel">
          <div class="board-shell">
            <div class="board">
              <canvas id="canvas"></canvas>
              <div id="yut-board-display">
                <div id="yut-result" class="yut-result"></div>
                <div id="yut-sticks"></div>
                <div id="throw-queue" class="throw-queue"></div>
              </div>
            </div>
          </div>
          <div class="status-frame">
            <div class="status-bar">
              <span id="status-text">대기 중...</span>
              <span id="timer-display" style="display:flex;align-items:center;gap:3px;white-space:nowrap;">
                <img src="/assets/Icon_timer.png" alt="" style="width:13px;height:13px;vertical-align:middle;">
                남은 시간 : <span id="timer-text">--</span> 초
              </span>
            </div>
          </div>
        </section>

        <!-- ── 오른쪽: 사이드 패널 ── -->
        <aside class="panel side-panel">

          <!-- 헤더 -->
          <div class="header-row">
            <span class="header-title">윷놀이한판요</span>
          </div>

          <!-- 플레이어 정보 -->
          <section class="frame player-frame">
            <div class="player-cards">
              <div id="p0-card" class="pcard p0 is-host">
                <img class="pcard-host-icon" src="/assets/host_icon.png" alt="방장">
                <div class="pcard-avatar-bg"><img id="p0-avatar-img" class="pcard-avatar-img" alt=""></div>
                <div class="pcard-namebar">
                  <div id="p0-name" class="pcard-name">대기 중</div>
                </div>
                <div class="pcard-bottom">
                  <div id="p0-pieces" class="pcard-piece-grid"></div>
                  <div id="p0-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
              <div id="p1-card" class="pcard p1">
                <img class="pcard-host-icon" src="/assets/host_icon.png" alt="방장">
                <div class="pcard-avatar-bg"><img id="p1-avatar-img" class="pcard-avatar-img" alt=""></div>
                <div class="pcard-namebar">
                  <div id="p1-name" class="pcard-name">대기 중...</div>
                </div>
                <div class="pcard-bottom">
                  <div id="p1-pieces" class="pcard-piece-grid"></div>
                  <div id="p1-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
              <div id="p2-card" class="pcard p2 empty-slot">
                <img class="pcard-host-icon" src="/assets/host_icon.png" alt="방장">
                <div class="pcard-avatar-bg"><img id="p2-avatar-img" class="pcard-avatar-img" alt=""></div>
                <div class="pcard-namebar">
                  <div id="p2-name" class="pcard-name"></div>
                </div>
                <div class="pcard-bottom">
                  <div id="p2-pieces" class="pcard-piece-grid"></div>
                  <div id="p2-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
              <div id="p3-card" class="pcard p3 empty-slot">
                <img class="pcard-host-icon" src="/assets/host_icon.png" alt="방장">
                <div class="pcard-avatar-bg"><img id="p3-avatar-img" class="pcard-avatar-img" alt=""></div>
                <div class="pcard-namebar">
                  <div id="p3-name" class="pcard-name"></div>
                </div>
                <div class="pcard-bottom">
                  <div id="p3-pieces" class="pcard-piece-grid"></div>
                  <div id="p3-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
            </div>
            <img class="cards-divider" src="/assets/cards_divider.png" alt="">
            <div class="player-action-row">
              <button id="btn-throw" class="game-btn primary" type="button" style="display:none">윷 던지기 (Space)</button>
              <div class="right-actions">
                <button id="btn-start" type="button" style="display:none;padding:0;border:none;background:none;cursor:pointer;width:96px;height:29px;"><img src="/assets/Game_START_disabled.png" alt="START" style="width:96px;height:29px;display:block;"></button>
                <button id="btn-ready" type="button" style="display:none;padding:0;border:none;background:none;cursor:pointer;width:96px;height:29px;"><img src="/assets/Game_READY.png" alt="READY" style="width:96px;height:29px;display:block;"></button>
              </div>
            </div>
          </section>

          <!-- 채팅 -->
          <section class="frame chat-frame">
            <div class="chat-shell">
              <div class="chat-box">
                <div id="chat-log" class="chat-log"></div>
              </div>
            </div>
            <div class="chat-input-row">
              <input id="chat-input" class="chat-input" type="text" placeholder="채팅 입력...">
            </div>
          </section>

          <!-- 하단 버튼 -->
          <div class="frame actions-frame">
            <div class="actions">
              <div class="left-actions">
                <button id="btn-forfeit" class="mini-btn" type="button" style="display:none">기권</button>
              </div>
              <button id="btn-leave" class="mini-btn exit" type="button">나가기</button>
            </div>
          </div>

        </aside>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/game-logic.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/client.js"></script>
</body>

</html>
