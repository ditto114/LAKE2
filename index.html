<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메이플 윷놀이 미니게임</title>
  <style>
    :root {
      --win-blue-1: #eef5fb;
      --win-blue-2: #d8e6f1;
      --win-blue-3: #bdd0dd;
      --win-blue-4: #93a8b9;
      --win-blue-5: #496577;
      --line: #c6ced7;
      --line-dark: #8fa4b6;
      --chat-bg: #262626;
      --blue-btn-top: #53a9e7;
      --blue-btn-mid: #2488d3;
      --blue-btn-bottom: #176ab2;
      --orange-btn-top: #ffb84c;
      --orange-btn-mid: #ff8d1d;
      --orange-btn-bottom: #e26a00;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(13,19,24,.14), rgba(13,19,24,.14)),
        url("./assets/Map_3F3F.webp") center / cover no-repeat fixed;
      padding: 16px;
      color: #2d3136;
      font-family: "Gulim","Dotum","Tahoma",sans-serif;
      font-size: 9pt;
      line-height: 1.15;
    }
    button, input { font: inherit; }

    /* ══════════════ 윈도우 프레임 ══════════════ */

    .window {
      width: min(100%, 742px);
      background: #cedfeb;
      border: 1px solid #4f6475;
      box-shadow: 0 0 0 1px #f8fdff, 0 0 0 2px #9ab0c2, 0 10px 28px rgba(47,64,80,.22);
      padding: 2px;
    }
    .window-inner {
      border: 1px solid #d8ebf8;
      background: linear-gradient(180deg, #eef5fa, #dce7f0);
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #a7bbcb;
      padding: 2px;
    }

    /* ══════════════ 로비 ══════════════ */

    .lobby { padding: 12px; }
    .lobby-title {
      text-align: center;
      font-size: 14pt;
      font-weight: bold;
      color: #384651;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .lobby-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 340px;
      margin: 0 auto;
    }
    .lobby-body input {
      height: 26px;
      border: 1px solid #7f96aa;
      background: #f9f9fb;
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #c5d2dc;
      padding: 0 6px;
      outline: none;
    }
    .lobby-join {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
    }
    .lobby-join input { text-transform: uppercase; letter-spacing: 2px; text-align: center; }
    .lobby-buttons { display: flex; flex-direction: column; gap: 4px; }
    .lobby-btn, #btn-refresh {
      height: 28px;
      border: 1px solid #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.6), inset -1px -1px 0 rgba(11,63,113,.45);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(9,55,98,.6);
      cursor: pointer;
      font-weight: bold;
    }
    #btn-refresh {
      background: linear-gradient(180deg, #f0f0f0, #c8d0d8);
      color: #555;
      border-color: #8f9ca7;
      text-shadow: none;
      font-weight: normal;
    }

    /* 방 목록 */
    #room-list {
      border: 1px solid #9eb1c0;
      background: #fff;
      min-height: 60px;
      max-height: 140px;
      overflow-y: auto;
      padding: 2px;
    }
    .room-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 6px;
      cursor: pointer;
      border-bottom: 1px solid #e8eef3;
    }
    .room-item:hover { background: #eef5fb; }
    .room-code-tag {
      font-weight: bold;
      color: #2488d3;
      letter-spacing: 1px;
    }
    .room-empty {
      text-align: center;
      color: #999;
      padding: 16px 0;
      margin: 0;
    }

    /* ══════════════ 게임 레이아웃 ══════════════ */

    .layout {
      display: grid;
      grid-template-columns: 393px 338px;
      gap: 2px;
      align-items: stretch;
    }
    .panel { background: transparent; border: 0; box-shadow: none; min-width: 0; }

    .board-panel {
      display: grid;
      grid-template-rows: minmax(0,1fr) 30px;
      gap: 2px;
    }
    .board-shell {
      border: 2px solid #6f879b;
      background: #f8fbfd;
      box-shadow: inset 1px 1px 0 #fff;
      padding: 3px;
    }
    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: #fff;
      overflow: hidden;
    }
    #canvas { display: block; }

    /* 오른쪽 액션 버튼 그룹 */
    .right-actions { display: flex; gap: 6px; margin-left: auto; }

    .status-frame {
      min-height: 30px;
      border: 2px solid #6f879b;
      background: #f8fbfd;
      box-shadow: inset 1px 1px 0 #fff;
      padding: 1px 7px 0;
    }
    .status-bar {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #3a3d42;
      white-space: nowrap;
    }
    #room-code-label {
      font-weight: bold;
      color: #2488d3;
      letter-spacing: 1px;
    }

    /* ══════════════ 사이드 패널 ══════════════ */

    .side-panel {
      display: grid;
      grid-template-rows: 30px minmax(0,1fr) 14px 110px 30px;
      gap: 2px;
    }

    .frame {
      border: 2px solid #6f879b;
      background: #f8fbfd;
      box-shadow: inset 1px 1px 0 #fff;
      min-width: 0;
      min-height: 0;
    }

    /* 헤더 */
    .header-row {
      display: grid;
      grid-template-columns: 71px 1fr;
      gap: 2px;
      height: 100%;
    }
    .logo-box {
      display: flex; align-items: center; justify-content: center; text-align: center;
      color: #485969; font-size: 8px; font-weight: bold; line-height: 1.05;
      border: 2px solid #6f879b; background: linear-gradient(180deg, #fafdfd, #dce7ef);
      box-shadow: inset 1px 1px 0 #fff;
    }
    .title-box {
      display: flex; align-items: center; padding: 0 8px;
      color: #384651; font-size: 9pt;
      border: 2px solid #6f879b; background: linear-gradient(180deg, #eef3f8, #d9e3eb);
      box-shadow: inset 1px 1px 0 #fff;
    }

    /* 플레이어 정보 */
    .player-frame {
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }
    .player-cards {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 4px;
      min-height: 0;
    }
    .pcard {
      flex: 1;
      min-width: 0;
      border: 2px solid #b0bcc8;
      background: #fff;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .pcard.p0 { border-color: #2488d3; }
    .pcard.p1 { border-color: #e04848; }
    .pcard.p2 { border-color: #28a428; }
    .pcard.p3 { border-color: #e07818; }
    .pcard-name {
      text-align: center;
      font-size: 9pt;
      font-weight: normal;
      padding: 2px 0;
      background: #eef3f8;
      border-bottom: 2px solid transparent;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pcard-color {
      width: 14px; height: 14px; border-radius: 50%;
      margin: 2px auto;
      border: 1px solid;
    }
    .pcard.p0 .pcard-color { background: #2488d3; border-color: #155f8a; }
    .pcard.p1 .pcard-color { background: #e04848; border-color: #a03030; }
    .pcard.p2 .pcard-color { background: #28a428; border-color: #1a6b1a; }
    .pcard.p3 .pcard-color { background: #e07818; border-color: #9c4800; }
    /* 카드 하단 (말 그리드 + 배지) */
    .pcard-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 2px;
    }
    .pcard-piece-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }
    .piece-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.25);
      flex-shrink: 0;
    }
    .piece-dot.gone { visibility: hidden; }
    .piece-dot.movable-dot {
      cursor: pointer;
      box-shadow: 0 0 0 2px rgba(255,200,0,.85), 0 0 5px rgba(255,180,0,.5);
    }
    .piece-dot.movable-dot:hover { filter: brightness(1.15); }
    .pcard.p0 .piece-dot { background: radial-gradient(circle at 35% 35%, #7dc4ff, #2488d3); border-color: #155f8a; }
    .pcard.p1 .piece-dot { background: radial-gradient(circle at 35% 35%, #ff9898, #e04848); border-color: #a03030; }
    .pcard.p2 .piece-dot { background: radial-gradient(circle at 35% 35%, #7de07d, #28a428); border-color: #1a6b1a; }
    .pcard.p3 .piece-dot { background: radial-gradient(circle at 35% 35%, #ffb870, #e07818); border-color: #9c4800; }

    /* 보드 위 윷 표시 오버레이 */
    #yut-board-display {
      position: absolute;
      left: 50%;
      top: 71%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    /* 플레이어 카드 하단 액션 버튼 */
    .player-action-row {
      display: flex;
      justify-content: flex-start;
      padding: 4px 4px 0;
      gap: 6px;
    }

    /* 빈 슬롯 카드 */
    .pcard.empty-slot {
      opacity: 0.28;
      background: #e8edf2;
      pointer-events: none;
    }

    /* 준비 배지 */
    .pcard-ready-badge {
      text-align: center;
      font-size: 9pt;
      font-weight: normal;
      color: #28a428;
      min-height: 10px;
    }
    .pcard.is-ready {
      box-shadow: 0 0 0 2px #28a428, 0 0 6px rgba(40,164,40,.25);
    }
    .pcard.is-host .pcard-ready-badge { color: #2488d3; }

    /* READY 버튼 활성 상태 */
    #btn-ready.ready-active {
      border-color: #1a7a1a;
      background: linear-gradient(180deg, #5bc05b, #3a9d3a);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,80,0,.6);
    }
    .game-btn:disabled { opacity: 0.5; cursor: default; }

    /* 윷 결과 (텍스트 숨김 — 요소는 JS 호환성 유지용) */
    .yut-result { display: none; }
    .yut-pop { animation: yutpop .35s ease-out; }
    @keyframes yutpop {
      0%   { transform: scale(1.8); opacity: .5; }
      100% { transform: scale(1);   opacity: 1; }
    }
    /* 던진 결과 큐 */
    .throw-queue {
      display: flex;
      gap: 3px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 0;
    }
    .throw-chip {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #8a9aaa;
      border-radius: 3px;
      background: linear-gradient(180deg, #f4f4f4, #d8dce0);
      font-size: 9pt;
      font-weight: bold;
      color: #444;
      animation: yutpop .35s ease-out;
    }

    .game-btn {
      height: 30px;
      min-width: 90px;
      padding: 0 12px;
      border: 1px solid #8f9ca7;
      background: linear-gradient(180deg, #f7f7f7, #c8d0d8);
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #909aa4;
      color: #555;
      font-size: 11pt;
      font-weight: bold;
      cursor: pointer;
    }
    .game-btn.primary {
      border-color: #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.6), inset -1px -1px 0 rgba(11,63,113,.45);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(9,55,98,.6);
    }
    .game-btn:active { transform: translateY(1px); }

    /* 채팅 */
    .chat-frame {
      display: grid;
      grid-template-rows: minmax(0,1fr) 25px;
      gap: 2px;
      padding: 2px;
    }
    .chat-shell {
      border: 1px solid #9eb1c0;
      background: #fff;
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #d4dce4;
      padding: 1px;
      min-height: 0;
      overflow: hidden;
    }
    .chat-box {
      position: relative;
      height: 100%;
      background: var(--chat-bg);
      border: 1px solid #767f88;
      overflow: hidden;
    }
    .chat-log {
      position: absolute;
      inset: 0;
      padding: 6px;
      color: #f0f0f0;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.35;
      font-size: 8.5pt;
    }
    .chat-log p { margin: 0 0 1px; }
    .chat-input-row { margin-top: 0; }
    .chat-input {
      width: 100%;
      height: 21px;
      border: 1px solid #7f96aa;
      background: #f9f9fb;
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #c5d2dc;
      padding: 0 5px;
      outline: none;
    }

    /* 하단 버튼 */
    .actions-frame { min-height: 30px; padding: 3px 4px 2px; }
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .left-actions { display: flex; gap: 3px; }
    .mini-btn {
      min-width: 44px; height: 20px; padding: 0 7px;
      border: 1px solid #1a5487;
      background: linear-gradient(180deg, var(--blue-btn-top), var(--blue-btn-mid) 68%, var(--blue-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.6), inset -1px -1px 0 rgba(11,63,113,.45);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(9,55,98,.6);
      cursor: pointer;
    }
    .mini-btn.exit {
      border-color: #ac5600;
      background: linear-gradient(180deg, var(--orange-btn-top), var(--orange-btn-mid) 68%, var(--orange-btn-bottom));
      box-shadow: inset 1px 1px 0 rgba(255,246,220,.7), inset -1px -1px 0 rgba(136,72,9,.45);
    }
    .mini-btn:active, .game-btn:active { transform: translateY(1px); }

    /* ══════════════ 타이머 ══════════════ */

    .timer-wrap {
      height: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 2px;
    }
    .timer-track {
      flex: 1;
      height: 8px;
      background: #dce4ec;
      border: 1px solid #a0b0be;
      border-radius: 2px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(180deg, #5bc05b, #3a9d3a);
      transition: width .25s linear;
      border-radius: 1px;
    }
    .timer-fill.urgent { background: linear-gradient(180deg, #e85050, #c03030); }
    #timer-text {
      min-width: 28px;
      text-align: right;
      font-size: 9px;
      font-weight: bold;
      color: #555;
    }
    #timer-text.urgent { color: #d03030; }

    /* ══════════════ 윷짝 ══════════════ */

    #yut-sticks {
      display: flex;
      gap: 5px;
      justify-content: center;
      min-height: 20px;
    }
    .stick {
      width: 10px;
      height: 28px;
      border-radius: 3px;
      border: 1px solid #8a7a50;
      animation: stickDrop .3s ease-out both;
    }
    .stick.flat {
      background: linear-gradient(180deg, #f8ecc8, #e4d09a);
      box-shadow: inset 1px 1px 0 rgba(255,255,255,.6);
    }
    .stick.round {
      background: linear-gradient(180deg, #a07830, #785818);
      box-shadow: inset 1px 1px 0 rgba(180,150,100,.4);
    }
    .stick.backdo {
      border-color: #c04040;
      box-shadow: 0 0 4px rgba(200,60,60,.5);
    }
    @keyframes stickDrop {
      0%   { transform: translateY(-12px) rotate(8deg); opacity: 0; }
      100% { transform: translateY(0) rotate(0); opacity: 1; }
    }

    /* ══════════════ 로비 HUD ══════════════ */

    #lobby-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    #lobby-greeting {
      font-family: "Gulim","Dotum","Tahoma",sans-serif;
      font-size: 9pt;
      color: #384651;
    }
    #lobby-elixir {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    #lobby-elixir img {
      height: 16px;
      image-rendering: pixelated;
      vertical-align: middle;
    }
    #lobby-elixir-count {
      font-weight: bold;
      color: #7b2fbe;
      font-size: 9pt;
    }

    /* ══════════════ 턴 표시 ══════════════ */

    .pcard.active-turn {
      box-shadow: 0 0 0 2px #ffcc00, 0 0 8px rgba(255,200,0,.35);
    }
    .pcard.active-turn .pcard-name {
      background: #fff8d8;
    }

    /* ══════════════ 반응형 ══════════════ */

    @media (max-width: 780px) {
      .layout { grid-template-columns: 1fr; }
      .window { width: min(100%, 520px); }
      .side-panel { grid-template-rows: auto auto auto auto auto; }
    }
    @media (max-width: 560px) {
      body { padding: 8px; }
      .window { width: 100%; }
      .player-cards { grid-template-columns: 1fr; }
      .actions, .left-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- ════════ 로그인/회원가입 화면 ════════ -->
  <main id="screen-auth" class="window">
    <div class="window-inner">
      <div class="lobby">

        <!-- 로그인 폼 -->
        <div id="auth-login" class="lobby-body">
          <input id="inp-login-nick" maxlength="12" placeholder="닉네임">
          <input id="inp-login-pw" type="password" placeholder="비밀번호">
          <button id="btn-login" class="lobby-btn" type="button">로그인</button>
          <button id="btn-show-signup" class="lobby-btn" type="button" style="background:linear-gradient(180deg,#f0f0f0,#c8d0d8);color:#555;border-color:#8f9ca7;text-shadow:none;">회원가입</button>
          <p id="login-error" style="color:#e04848;text-align:center;min-height:14px;margin:0;"></p>
        </div>

        <!-- 회원가입 폼 -->
        <div id="auth-signup" class="lobby-body" style="display:none">
          <input id="inp-signup-nick" maxlength="12" placeholder="닉네임">
          <input id="inp-signup-pw" type="password" placeholder="비밀번호">
          <input id="inp-signup-pw2" type="password" placeholder="비밀번호 확인">
          <input id="inp-signup-ingame" maxlength="12" placeholder="인게임 닉네임 (본인확인용)">
          <button id="btn-signup" class="lobby-btn" type="button">가입하기</button>
          <button id="btn-show-login" class="lobby-btn" type="button" style="background:linear-gradient(180deg,#f0f0f0,#c8d0d8);color:#555;border-color:#8f9ca7;text-shadow:none;">돌아가기</button>
          <p id="signup-error" style="color:#e04848;text-align:center;min-height:14px;margin:0;"></p>
        </div>

      </div>
    </div>
  </main>

  <!-- ════════ 로비 화면 ════════ -->
  <main id="screen-lobby" class="window" style="display:none">
    <div class="window-inner">
      <div class="lobby">
        <div id="lobby-hud">
          <span id="lobby-greeting"><span id="greeting-name"></span>님 안녕하세요~</span>
          <span id="lobby-elixir">
            <img src="/assets/Elixir.png" alt="Elixir">
            <span id="lobby-elixir-count">0</span>
          </span>
        </div>
        <div class="lobby-body">
          <div class="lobby-buttons">
            <button id="btn-create" class="lobby-btn" type="button">방 만들기</button>
            <div class="lobby-join">
              <input id="inp-code" maxlength="4" placeholder="방 코드">
              <button id="btn-join" class="lobby-btn" type="button">참가</button>
            </div>
          </div>
          <div id="room-list"></div>
          <button id="btn-refresh" type="button">방 목록 새로고침</button>
          <button id="btn-logout" type="button" style="height:22px;padding:0 8px;border:1px solid #ac5600;background:linear-gradient(180deg,#ffb84c,#ff8d1d 68%,#e26a00);color:#fff;text-shadow:1px 1px 0 rgba(136,72,9,.6);cursor:pointer;font-family:'Gulim','Dotum','Tahoma',sans-serif;font-size:9pt;align-self:flex-end;">로그아웃</button>
        </div>
      </div>
    </div>
  </main>

  <!-- ════════ 게임 화면 ════════ -->
  <main id="screen-game" class="window" style="display:none">
    <div class="window-inner">
      <div class="layout">

        <!-- ── 왼쪽: 윷판 ── -->
        <section class="panel board-panel">
          <div class="board-shell">
            <div class="board">
              <canvas id="canvas"></canvas>
              <div id="yut-board-display">
                <div id="yut-result" class="yut-result"></div>
                <div id="yut-sticks"></div>
                <div id="throw-queue" class="throw-queue"></div>
              </div>
            </div>
          </div>
          <div class="status-frame">
            <div class="status-bar">
              <span id="status-text">대기 중...</span>
              <span id="room-code-label"></span>
            </div>
          </div>
        </section>

        <!-- ── 오른쪽: 사이드 패널 ── -->
        <aside class="panel side-panel">

          <!-- 헤더 -->
          <div class="header-row">
            <div class="logo-box">MAPLE<br>MINIGAME</div>
            <div class="title-box">윷놀이한판요</div>
          </div>

          <!-- 플레이어 정보 -->
          <section class="frame player-frame">
            <div class="player-cards">
              <div id="p0-card" class="pcard p0 is-host">
                <div id="p0-name" class="pcard-name">대기 중</div>
                <div class="pcard-color"></div>
                <div class="pcard-bottom">
                  <div id="p0-pieces" class="pcard-piece-grid"></div>
                  <div id="p0-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
              <div id="p1-card" class="pcard p1">
                <div id="p1-name" class="pcard-name">대기 중...</div>
                <div class="pcard-color"></div>
                <div class="pcard-bottom">
                  <div id="p1-pieces" class="pcard-piece-grid"></div>
                  <div id="p1-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
              <div id="p2-card" class="pcard p2 empty-slot">
                <div id="p2-name" class="pcard-name"></div>
                <div class="pcard-color"></div>
                <div class="pcard-bottom">
                  <div id="p2-pieces" class="pcard-piece-grid"></div>
                  <div id="p2-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
              <div id="p3-card" class="pcard p3 empty-slot">
                <div id="p3-name" class="pcard-name"></div>
                <div class="pcard-color"></div>
                <div class="pcard-bottom">
                  <div id="p3-pieces" class="pcard-piece-grid"></div>
                  <div id="p3-ready-badge" class="pcard-ready-badge"></div>
                </div>
              </div>
            </div>
            <div class="player-action-row">
              <button id="btn-throw" class="game-btn primary" type="button" style="display:none">윷 던지기 (Space)</button>
              <div class="right-actions">
                <button id="btn-start" class="game-btn primary" type="button" style="display:none">START!!</button>
                <button id="btn-ready" class="game-btn" type="button" style="display:none">READY</button>
              </div>
            </div>
          </section>

          <!-- 타이머 -->
          <div class="timer-wrap">
            <div class="timer-track"><div id="timer-bar" class="timer-fill" style="width:0%"></div></div>
            <span id="timer-text"></span>
          </div>

          <!-- 채팅 -->
          <section class="frame chat-frame">
            <div class="chat-shell">
              <div class="chat-box">
                <div id="chat-log" class="chat-log"></div>
              </div>
            </div>
            <div class="chat-input-row">
              <input id="chat-input" class="chat-input" type="text" placeholder="채팅 입력...">
            </div>
          </section>

          <!-- 하단 버튼 -->
          <div class="frame actions-frame">
            <div class="actions">
              <div class="left-actions">
                <button id="btn-forfeit" class="mini-btn" type="button" style="display:none">기권</button>
              </div>
              <button id="btn-leave" class="mini-btn exit" type="button">나가기</button>
            </div>
          </div>

        </aside>
      </div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/game-logic.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/client.js"></script>
</body>
</html>
